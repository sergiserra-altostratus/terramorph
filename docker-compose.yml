services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-development}
      args:
        - INSTALL_GCLOUD=${INSTALL_GCLOUD:-true}
    ports:
      - "${BACKEND_PORT:-8001}:8000"
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/credentials/adc.json
      - TERRAMORPH_ENV=${TERRAMORPH_ENV:-development}
      - TERRAMORPH_LOG_LEVEL=${TERRAMORPH_LOG_LEVEL:-debug}
      - CORS_ORIGINS=http://localhost:${FRONTEND_PORT:-3000}
    volumes:
      - ${GOOGLE_APPLICATION_CREDENTIALS:-~/.config/gcloud/application_default_credentials.json}:/credentials/adc.json:ro
      - ./backend/app:/app/app
      - terramorph-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: ${DOCKER_TARGET:-development}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:${BACKEND_PORT:-8001}/api/v1
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

networks:
  default:
    name: terramorph-network

volumes:
  terramorph-data:
    name: terramorph-data
