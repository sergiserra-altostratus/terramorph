version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend/app:/app/app
      - ${GOOGLE_APPLICATION_CREDENTIALS:-~/.config/gcloud/application_default_credentials.json}:/credentials/adc.json:ro
    environment:
      - TERRAMORPH_ENV=development
      - TERRAMORPH_LOG_LEVEL=debug
      - CORS_ORIGINS=http://localhost:3000
      - GOOGLE_APPLICATION_CREDENTIALS=/credentials/adc.json
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./frontend/src:/app/src
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
    command: npm run dev
